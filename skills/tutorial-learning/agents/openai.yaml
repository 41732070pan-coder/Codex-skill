  short_description: "Design source-traced Chinese tutorial bundles"
  default_prompt: "Use $tutorial-learning to turn a PDF, HTML, Markdown, or heading-structured tutorial source into a medium-neutral Chinese course-design bundle. Select route-overview or chapter-tutorial mode from scope and evidence, personalize the route, gate teaching depth by source granularity, and design source-specific lessons, diagnostic assessments, practical tasks, review planning, and renderer handoff. Do not generate a final presentation artifact."
