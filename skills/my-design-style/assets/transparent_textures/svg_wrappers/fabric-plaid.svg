<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Fabric Plaid seamless texture">
  <title>Fabric Plaid texture</title>
  <desc>Self-contained seamless woven textile (Fabric Plaid). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 200x200.</desc>
  <defs>
    <pattern id="fabric-plaid" patternUnits="userSpaceOnUse" width="200" height="200">
      <image href="data:image/png;base64," width="200" height="200" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#fabric-plaid)"/>
</svg>
