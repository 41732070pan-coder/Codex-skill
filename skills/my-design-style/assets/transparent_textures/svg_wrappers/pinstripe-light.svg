<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Pinstripe Light seamless texture">
  <title>Pinstripe Light texture</title>
  <desc>Self-contained seamless tiled geometric motif (Pinstripe Light). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 50x500.</desc>
  <defs>
    <pattern id="pinstripe-light" patternUnits="userSpaceOnUse" width="50" height="500">
      <image href="data:image/png;base64," width="50" height="500" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#pinstripe-light)"/>
</svg>
