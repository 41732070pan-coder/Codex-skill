<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Diagmonds seamless texture">
  <title>Diagmonds texture</title>
  <desc>Self-contained seamless tiled geometric motif (Diagmonds). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 141x142.</desc>
  <defs>
    <pattern id="diagmonds" patternUnits="userSpaceOnUse" width="141" height="142">
      <image href="data:image/png;base64," width="141" height="142" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#diagmonds)"/>
</svg>
