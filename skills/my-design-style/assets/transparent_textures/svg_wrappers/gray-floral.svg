<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Gray Floral seamless texture">
  <title>Gray Floral texture</title>
  <desc>Self-contained seamless tiled geometric motif (Gray Floral). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 150x124.</desc>
  <defs>
    <pattern id="gray-floral" patternUnits="userSpaceOnUse" width="150" height="124">
      <image href="data:image/png;base64," width="150" height="124" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#gray-floral)"/>
</svg>
