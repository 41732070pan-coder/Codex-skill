<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Brushed Aluminium seamless texture">
  <title>Brushed Aluminium texture</title>
  <desc>Self-contained seamless brushed metal (Brushed Aluminium). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 400x400.</desc>
  <defs>
    <pattern id="brushed-alum" patternUnits="userSpaceOnUse" width="400" height="400">
      <image href="data:image/png;base64," width="400" height="400" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#brushed-alum)"/>
</svg>
