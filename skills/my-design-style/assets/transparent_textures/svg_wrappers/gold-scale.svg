<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Gold Scale seamless texture">
  <title>Gold Scale texture</title>
  <desc>Self-contained seamless brushed metal (Gold Scale). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 25x25.</desc>
  <defs>
    <pattern id="gold-scale" patternUnits="userSpaceOnUse" width="25" height="25">
      <image href="data:image/png;base64," width="25" height="25" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#gold-scale)"/>
</svg>
