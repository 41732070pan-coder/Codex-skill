<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Hexellence seamless texture">
  <title>Hexellence texture</title>
  <desc>Self-contained seamless tiled geometric motif (Hexellence). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 150x173.</desc>
  <defs>
    <pattern id="hexellence" patternUnits="userSpaceOnUse" width="150" height="173">
      <image href="data:image/png;base64," width="150" height="173" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#hexellence)"/>
</svg>
