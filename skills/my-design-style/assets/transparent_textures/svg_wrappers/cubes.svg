<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Cubes seamless texture">
  <title>Cubes texture</title>
  <desc>Self-contained seamless tiled geometric motif (Cubes). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 67x100.</desc>
  <defs>
    <pattern id="cubes" patternUnits="userSpaceOnUse" width="67" height="100">
      <image href="data:image/png;base64," width="67" height="100" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#cubes)"/>
</svg>
