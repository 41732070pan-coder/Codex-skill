<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Maze White seamless texture">
  <title>Maze White texture</title>
  <desc>Self-contained seamless tiled geometric motif (Maze White). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 46x23.</desc>
  <defs>
    <pattern id="maze-white" patternUnits="userSpaceOnUse" width="46" height="23">
      <image href="data:image/png;base64," width="46" height="23" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#maze-white)"/>
</svg>
