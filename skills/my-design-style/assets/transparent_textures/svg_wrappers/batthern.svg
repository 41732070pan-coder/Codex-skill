<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Batthern seamless texture">
  <title>Batthern texture</title>
  <desc>Self-contained seamless tiled geometric motif (Batthern). PNG tile inlined as base64 data URI; no network dependency, renders offline and in headless export. Tile 100x99.</desc>
  <defs>
    <pattern id="batthern" patternUnits="userSpaceOnUse" width="100" height="99">
      <image href="data:image/png;base64," width="100" height="99" preserveAspectRatio="xMidYMid slice"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#batthern)"/>
</svg>
