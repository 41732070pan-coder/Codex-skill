<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Paper Fibers procedural transparent texture">
  <title>Paper Fibers texture</title>
  <desc>Self-contained procedural paper-fiber grain generated with feTurbulence. No network dependency; renders fully offline as a tiling overlay.</desc>
  <defs>
    <filter id="tex-paper-fibers" x="0" y="0" width="240" height="240" filterUnits="userSpaceOnUse">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.42" numOctaves="3" seed="29" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0 0.05  0.4 0 0 0 0"/>
    </filter>
    <pattern id="paper-fibers" patternUnits="userSpaceOnUse" width="240" height="240">
      <rect width="240" height="240" filter="url(#tex-paper-fibers)"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#paper-fibers)"/>
</svg>
